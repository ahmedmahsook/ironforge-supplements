services:
  db:
    image: postgres:17
    container_name: gym-postgres
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: gymdb

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: gym-redis
    restart: always

    ports:
      - "6379:6379"

  api:
    build: .
    container_name: gym-api
    restart: always

    depends_on:
      - db
      - redis

    ports:
      - "8080:8080"

    env_file:
      - .env

    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: gymdb
      DB_SSLMODE: disable

      REDIS_HOST: redis
      REDIS_PORT: 6379

volumes:
  postgres_data: